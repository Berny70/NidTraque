<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rattachement VigieNid</title>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f0f4f0; }
    .card { background: white; border-radius: 16px; padding: 2rem; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-width: 320px; }
    img { width: 80px; margin-bottom: 1rem; }
    h2 { color: #2d6a2d; margin: 0 0 0.5rem; }
    p { color: #666; font-size: 14px; }
    .spinner { width: 40px; height: 40px; border: 4px solid #e0e0e0; border-top-color: #2d6a2d; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 1rem auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h2>🐝 VigieNid</h2>
    <p>Rattachement au pilote en cours…</p>
    <div class="spinner"></div>
    <p id="msg" style="font-size:12px;color:#999"></p>
  </div>
  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const pilotId = params.get('pilot');
      const msg = document.getElementById('msg');

      if (!pilotId) {
        msg.textContent = 'Paramètre pilote manquant.';
        return;
      }

      // Stocker dans cookie (partagé avec la PWA sur iOS)
      const expires = new Date(Date.now() + 365 * 864e5).toUTCString();
      document.cookie = 'pilot_id=' + encodeURIComponent(pilotId) + '; expires=' + expires + '; path=/';

      // Stocker aussi en localStorage (pour les autres navigateurs)
      try { localStorage.setItem('pilot_id', pilotId); } catch(e) {}
      try { localStorage.removeItem('pilot_attached'); } catch(e) {}

      msg.textContent = 'Redirection vers VigieNid…';

      // Rediriger vers VigieNid après 1s
      setTimeout(() => {
        window.location.replace('https://berny70.github.io/NidTraque/?pilot=' + encodeURIComponent(pilotId));
      }, 1000);
    })();
  </script>
</body>
</html>
