<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title data-i18n="map_title">Localisation du nid</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    #map {
      height: 100vh;
      width: 100vw;
    }

    #btnBackMap {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 2000;
      padding: 6px 10px;
      font-size: 1em;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }

    .legend {
      position: absolute;
      bottom: 10px;
      left: 10px;
      background: white;
      padding: 8px;
      border-radius: 6px;
      font-size: 0.9em;
      box-shadow: 0 0 5px rgba(0,0,0,0.3);
    }

    /* ✅ DECLINAISON */
    .declinaison-box {
      position: absolute;
      top: 60px;
      left: 10px;
      z-index: 9999;

      background: white;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 0.9em;

      display: flex;
      align-items: center;
      gap: 6px;

      box-shadow: 0 0 5px rgba(0,0,0,0.3);
    }

    .declinaison-box input {
      width: 60px;
      text-align: center;
    }

    /* ✅ FONDS DE CARTE */
    .basemap-control {
      background: white;
      border-radius: 8px;
      box-shadow: 0 0 5px rgba(0,0,0,0.3);
      padding: 4px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .basemap-btn {
      border: none;
      background: transparent;
      padding: 6px 10px;
      font-size: 0.85em;
      text-align: left;
      border-radius: 5px;
      cursor: pointer;
      white-space: nowrap;
    }
    .basemap-btn:hover { background: #f0f0f0; }
    .basemap-btn--active { background: #2d5a27; color: white; }
  </style>
</head>

<body>

<button id="btnBackMap">
  ⬅ <span data-i18n="back">Retour</span>
</button>

<button id="btnCaptMap" style="position:absolute;top:12px;right:12px;z-index:1000;background:#c8a44a;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,0.25)">
  📸 Capture
</button>

<div id="map"></div>

<!-- ✅ BON EMPLACEMENT -->
<div class="declinaison-box">
  <span data-i18n="magnetic_declination"></span> :
  <input
    type="text"
    id="declinaisonInput"
    inputmode="decimal"
  > °
</div>

<div class="legend">
  <b>Chrono Frelon – V7</b><br>
  <span data-i18n="map_legend">
    Points d’observation et directions
  </span>
</div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- I18N -->
<script src="./js/i18n.js"></script>

<!-- Supabase -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="./js/supabase.js"></script>

<!-- Carte -->
<script src="./map.js"></script>

<!-- Capture d'écran de la carte -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
document.getElementById("btnCaptMap")?.addEventListener("click", async () => {
  const btn = document.getElementById("btnCaptMap");
  btn.disabled = true;
  btn.textContent = "⏳ ...";

  try {
    const canvas = await html2canvas(document.getElementById("map"), {
      scale: 2,
      useCORS: true,
      allowTaint: true,
    });

    const blob = await new Promise(resolve => canvas.toBlob(resolve, "image/png"));
    const filename = "ChassNid_carte_" + new Date().toISOString().replace(/[:.]/g, "-") + ".png";

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
  } catch (e) {
    alert("Capture impossible : " + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = "📸 Capture";
  }
});
</script>

</body>
</html>
